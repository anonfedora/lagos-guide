<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@700&family=Mukta:wght@800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{ --bg:#f2e6d0; --ink:#33281b; --ink2:#6a5840; --terra:#c5612e; --ochre:#ce922a; --landmark:#5a4530; }
  *{ margin:0; box-sizing:border-box; }
  body{ background:#ccc; }
  .card{ width:1200px; height:630px; background:var(--bg); position:relative; overflow:hidden;
         font-family:"Inter",system-ui,sans-serif; padding:58px 70px; }
  .sun{ position:absolute; top:-210px; right:-190px; width:600px; height:600px; opacity:.2; border-radius:50%;
        background:repeating-conic-gradient(var(--ochre) 0 0.9deg, transparent 0.9deg 9deg);
        -webkit-mask:radial-gradient(circle, transparent 26%, #000 29%, #000 49%, transparent 52%);
                mask:radial-gradient(circle, transparent 26%, #000 29%, #000 49%, transparent 52%); }
  .ring{ position:absolute; width:70px; height:70px; border:4px solid var(--terra); border-radius:50%; right:330px; top:104px; opacity:.5; }
  .dia{ position:absolute; width:38px; height:38px; border:4px solid var(--ochre); right:226px; top:250px; transform:rotate(45deg); opacity:.5; }
  .kicker{ font-family:"Space Mono",monospace; font-size:18px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink2); display:flex; gap:14px; align-items:center; }
  .kdot{ width:7px; height:7px; border-radius:50%; background:var(--ochre); }
  .title{ position:relative; display:inline-block; margin-top:34px; }
  .echo{ position:absolute; left:0; top:0; transform-origin:left top; transform:translate(.16em,.3em) skewX(-20deg) scaleY(1.08);
         font-family:"Mukta",sans-serif; font-weight:800; color:var(--terra); opacity:.16; line-height:1; white-space:nowrap; font-size:188px; }
  .latin{ position:relative; font-family:"Space Grotesk",sans-serif; font-weight:700; font-size:188px; letter-spacing:-.045em; color:var(--ink); line-height:.9; }
  .sub{ margin-top:30px; font-size:35px; font-weight:500; color:var(--ink2); font-family:"Space Grotesk",sans-serif; letter-spacing:-.01em; }
  .sub b{ color:var(--terra); font-weight:700; }
  .a11y{ display:inline-block; margin-top:20px; font-family:"Space Mono",monospace; font-size:15px; color:var(--terra); border:1.6px solid var(--terra); padding:8px 15px; border-radius:999px; text-transform:uppercase; letter-spacing:.05em; }
  .sea{ position:absolute; left:0; bottom:0; width:1200px; opacity:.12; color:var(--landmark); }
  .foot{ position:absolute; left:70px; bottom:54px; font-family:"Space Mono",monospace; font-size:18px; letter-spacing:.04em; text-transform:uppercase; color:var(--ink2); }
  .brand{ position:absolute; right:70px; bottom:46px; color:var(--ink); }
  .brand .logo{ width:194px; height:auto; display:block; }
</style>
</head>
<body>
  <div class="card">
    <div class="sun"></div>
    <div class="ring"></div>
    <div class="dia"></div>
    <div class="kicker"><span class="kdot"></span>Ethereum Foundation<span class="kdot"></span>Lagos, Nigeria</div>
    <div class="title"><span class="echo">Lagos</span><span class="latin">Lagos.</span></div>
    <div class="sub">The comprehensive <b>City Guide</b> for visitors</div>
    <div class="a11y">Read-aloud + high-contrast ready</div>

    <svg class="sea" viewBox="0 0 1200 170" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="0" y1="128" x2="1200" y2="128"/><line x1="0" y1="134" x2="1200" y2="134"/>
      <path d="M400 128 L405 26 L411 128"/>
      <line x1="405" y1="36" x2="270" y2="128"/><line x1="405" y1="36" x2="330" y2="128"/><line x1="405" y1="36" x2="470" y2="128"/><line x1="405" y1="36" x2="540" y2="128"/>
      <path d="M800 128 L805 26 L811 128"/>
      <line x1="805" y1="36" x2="670" y2="128"/><line x1="805" y1="36" x2="730" y2="128"/><line x1="805" y1="36" x2="870" y2="128"/><line x1="805" y1="36" x2="940" y2="128"/>
    </svg>

    <div class="foot">Victoria Island, Lagos</div>
    <div class="brand">
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:24px;">LAGOS GUIDE</div>
    </div>
  </div>
</body>
</html>
